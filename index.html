<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chacras Nuevas de Matanzas — Diez sitios sobre el mar</title>
  <meta name="description" content="Diez sitios entre 622 y 926 m² en Centinela, Matanzas. A pasos de la caleta y la playa. Boutique, urbanizado, con vista al Pacífico." />
  <link rel="canonical" href="https://chacrasnuevas.cl/" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
/* ============================================================
   EDITORIAL SITE — Chacras Nuevas de Matanzas
   Focused, responsive, mobile-first
   ============================================================ */

:root {
  --ed-bg: #f3ede1;
  --ed-bg-2: #e9e0cf;
  --ed-bg-3: #faf6ed;
  --ed-ink: #1a1a17;
  --ed-ink-2: #3d3a32;
  --ed-muted: #8a8475;
  --ed-line: rgba(26,26,23,0.12);
  --ed-line-soft: rgba(26,26,23,0.06);
  --ed-accent: #5a6b5a;
  --ed-accent-2: #b08a5a;
  --ed-dark: #14130f;
  --ed-cream: #f5efe5;

  --ed-serif: 'Cormorant Garamond', 'Times New Roman', serif;
  --ed-sans: 'Inter', system-ui, -apple-system, sans-serif;
  --ed-mono: 'JetBrains Mono', ui-monospace, monospace;

  --ed-shadow: 0 24px 60px -20px rgba(20,19,15,0.25);

  --ed-h1: clamp(40px, 6vw, 88px);
  --ed-h2: clamp(28px, 4vw, 56px);
  --ed-h3: clamp(20px, 2.5vw, 32px);
  --ed-body: clamp(15px, 1.05vw, 17px);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--ed-sans);
  font-size: var(--ed-body);
  line-height: 1.55;
  color: var(--ed-ink);
  background: var(--ed-bg);
  -webkit-font-smoothing: antialiased;
}

img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; border: none; background: none; }

.eyebrow {
  font-family: var(--ed-mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ed-muted);
}
.serif {
  font-family: var(--ed-serif);
  font-weight: 400;
  font-style: italic;
}

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--ed-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 14px 22px;
  border: 1px solid currentColor;
  border-radius: 999px;
  color: var(--ed-ink);
  background: transparent;
  transition: all .25s ease;
}
.btn:hover { background: var(--ed-ink); color: var(--ed-cream); border-color: var(--ed-ink); }
.btn.solid { background: var(--ed-ink); color: var(--ed-cream); border-color: var(--ed-ink); }
.btn.solid:hover { background: transparent; color: var(--ed-ink); }
.btn.light { color: var(--ed-cream); border-color: rgba(245,239,229,0.7); }
.btn.light:hover { background: var(--ed-cream); color: var(--ed-dark); border-color: var(--ed-cream); }
.btn.solid.light { background: var(--ed-cream); color: var(--ed-dark); border-color: var(--ed-cream); }
.btn.solid.light:hover { background: transparent; color: var(--ed-cream); border-color: var(--ed-cream); }
.btn .arrow { transition: transform .25s ease; }
.btn:hover .arrow { transform: translateX(4px); }
.btn.wp { display: inline-flex; align-items: center; gap: 10px; }
.btn.wp .pulse {
  width: 8px; height: 8px; border-radius: 50%;
  background: #79c267;
  box-shadow: 0 0 0 4px rgba(121,194,103,0.25);
}

/* ===== Site nav ===== */
.site-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 20px 32px;
  transition: all .35s ease;
  color: var(--ed-cream);
}
.site-nav.scrolled {
  background: var(--ed-bg);
  color: var(--ed-ink);
  box-shadow: 0 1px 0 var(--ed-line);
  padding: 14px 32px;
}
.site-nav.solid-top {
  background: var(--ed-bg);
  color: var(--ed-ink);
  box-shadow: 0 1px 0 var(--ed-line);
}
.site-nav.solid-top .brand img { filter: none; }
.site-nav .links {
  display: flex;
  gap: 28px;
  font-family: var(--ed-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.site-nav .links.left { justify-self: start; }
.site-nav .links.right { justify-self: end; }
.site-nav .brand img {
  height: 48px;
  width: auto;
  filter: invert(1) brightness(1.1);
  transition: filter .35s ease, height .35s ease;
}
.site-nav.scrolled .brand img { filter: none; height: 38px; }
.site-nav .lang {
  border: 1px solid currentColor;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 10px;
}
.menu-btn { display: none; }

/* ===== Hero — 3:1 ===== */
.hero-3to1 {
  position: relative;
  width: 100%;
  aspect-ratio: 3 / 1;
  min-height: 480px;
  background: var(--ed-dark);
  color: var(--ed-cream);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.hero-3to1 .hero-bg {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center;
  background-image: url(assets/proyecto/sunset-pinos.png);
}
.hero-3to1 .hero-overlay {
  position: absolute; inset: 0;
  background:
    linear-gradient(180deg, rgba(20,19,15,0.55) 0%, rgba(20,19,15,0.1) 35%, rgba(20,19,15,0.25) 65%, rgba(20,19,15,0.75) 100%);
  z-index: 2;
}
.hero-content {
  position: relative;
  z-index: 4;
  text-align: center;
  padding: 0 32px;
  max-width: 880px;
}
.hero-logo {
  width: min(420px, 78vw);
  filter: invert(1) brightness(1.05) drop-shadow(0 4px 20px rgba(0,0,0,0.4));
  margin: 0 auto 28px;
}
.hero-tag {
  font-family: var(--ed-serif);
  font-style: italic;
  font-size: clamp(18px, 2.2vw, 26px);
  line-height: 1.4;
  color: rgba(245,239,229,0.94);
  margin: 0 0 28px;
  letter-spacing: -0.005em;
}
.hero-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.hero-coords {
  position: absolute;
  bottom: 24px; left: 32px;
  z-index: 4;
  font-family: var(--ed-mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(245,239,229,0.7);
  display: flex; flex-direction: column; gap: 4px;
}
.hero-scroll {
  position: absolute;
  bottom: 24px; right: 32px;
  z-index: 4;
  font-family: var(--ed-mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(245,239,229,0.7);
}

/* ===== Meta strip ===== */
.meta-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  margin: 0;
  padding: 32px 0;
  border-bottom: 1px solid var(--ed-line);
  background: var(--ed-bg);
}
.meta-strip > div {
  text-align: center;
  padding: 0 16px;
  border-right: 1px solid var(--ed-line);
}
.meta-strip > div:last-child { border-right: none; }
.meta-strip dt {
  font-family: var(--ed-mono);
  font-size: 10.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ed-muted);
  margin: 0 0 8px;
}
.meta-strip dd {
  font-family: var(--ed-serif);
  font-style: italic;
  font-size: clamp(28px, 3vw, 42px);
  margin: 0;
  letter-spacing: -0.01em;
}

/* ===== Section base ===== */
.section {
  padding: clamp(60px, 8vw, 110px) clamp(20px, 4vw, 64px);
  border-top: 1px solid var(--ed-line);
}
.section.alt { background: var(--ed-bg-2); }
.section .head {
  margin-bottom: 32px;
}
.section .head h2 {
  font-family: var(--ed-serif);
  font-weight: 400;
  font-size: var(--ed-h2);
  line-height: 1.08;
  letter-spacing: -0.01em;
  margin: 12px 0 0;
  max-width: 22em;
}
.section .head h2 em { font-style: italic; }
.section p {
  font-size: var(--ed-body);
  line-height: 1.65;
  color: var(--ed-ink-2);
  max-width: 38em;
}

/* ===== Manifiesto ===== */
.manifesto h2 {
  font-size: clamp(28px, 3.5vw, 48px);
  line-height: 1.12;
  margin: 14px 0 36px;
  max-width: 26em;
}
.manifesto-cols {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(28px, 4vw, 56px);
  padding-top: 24px;
  border-top: 1px solid var(--ed-line);
}

/* ===== Sports icons (La Zona) ===== */
.sports-icons {
  display: flex;
  gap: clamp(20px, 3vw, 40px);
  margin-top: 24px;
  align-items: flex-end;
  flex-wrap: wrap;
}
.sports-icons .sport {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  color: var(--ed-ink);
}
.sports-icons .sport-svg {
  width: 56px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.sports-icons .sport-svg svg { width: 100%; height: 100%; }
.sports-icons .sport-name {
  font-family: var(--ed-mono);
  font-size: 10.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ed-ink-2);
}

/* ===== Vida carousel ===== */
.vida-carousel {
  position: relative;
  margin-top: 40px;
}
.vida-track {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scrollbar-width: none;
  padding-bottom: 4px;
  scroll-padding-left: 0;
}
.vida-track::-webkit-scrollbar { display: none; }
.vida-slide {
  position: relative;
  flex: 0 0 clamp(280px, 38vw, 520px);
  aspect-ratio: 4/5;
  scroll-snap-align: start;
  overflow: hidden;
  border-radius: 2px;
  background: var(--ed-bg-3);
  margin: 0;
}
.vida-slide .img {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center;
  transition: transform .8s cubic-bezier(.2,.7,.2,1);
}
.vida-slide:hover .img { transform: scale(1.04); }
.vida-slide::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(20,19,15,0) 45%, rgba(20,19,15,0.85) 100%);
  pointer-events: none;
}
.vida-slide .cap {
  position: absolute;
  left: 22px; right: 22px; bottom: 22px;
  z-index: 2;
  color: var(--ed-cream);
}
.vida-slide .cap .tag {
  font-family: var(--ed-mono);
  font-size: 9.5px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #d8c69a;
  display: block;
  margin-bottom: 8px;
}
.vida-slide .cap h3 {
  font-family: var(--ed-serif);
  font-weight: 400;
  font-style: italic;
  font-size: clamp(20px, 1.9vw, 28px);
  line-height: 1.15;
  margin: 0 0 6px;
  letter-spacing: -0.01em;
}
.vida-slide .cap p {
  font-family: var(--ed-sans);
  font-size: 13px;
  line-height: 1.5;
  margin: 0;
  color: rgba(245,239,229,0.85);
}
.vida-nav {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 18px;
}
.vida-arrow {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 1px solid var(--ed-line);
  background: var(--ed-bg-3);
  color: var(--ed-ink);
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .25s;
}
.vida-arrow:hover:not(:disabled) {
  background: var(--ed-ink);
  color: var(--ed-cream);
  border-color: var(--ed-ink);
}
.vida-arrow:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

@media (max-width: 640px) {
  .vida-slide { flex: 0 0 78vw; }
  .sports-icons { gap: 24px; }
  .sports-icons .sport-svg { width: 44px; height: 44px; }
}

/* ===== Project icons strip ===== */
.proyecto-iconos {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  margin-top: 56px;
  padding-top: 36px;
  border-top: 1px solid var(--ed-line);
}
.proyecto-iconos .pi {
  position: relative;
  text-align: center;
  padding: 8px 18px;
}
.proyecto-iconos .pi + .pi::before {
  content: "";
  position: absolute;
  left: 0; top: 12px; bottom: 12px;
  width: 1px;
  background: var(--ed-line);
}
.proyecto-iconos .pi-icon {
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 14px;
  color: var(--ed-ink);
}
.proyecto-iconos .pi-icon svg { width: 48px; height: 48px; }
.proyecto-iconos .pi-num {
  font-family: var(--ed-serif);
  font-style: italic;
  font-size: clamp(28px, 3vw, 42px);
  line-height: 1;
  margin-bottom: 14px;
}
.proyecto-iconos .pi-label {
  font-family: var(--ed-mono);
  font-size: 10.5px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ed-ink-2);
  line-height: 1.5;
}
.proyecto-iconos .pi-sub {
  display: block;
  font-size: 9.5px;
  color: var(--ed-muted);
  margin-top: 4px;
  letter-spacing: 0.18em;
}

/* ===== Vida en Matanzas — editorial layout ===== */
.vida-intro {
  display: grid;
  grid-template-columns: 1fr 1.3fr;
  gap: clamp(28px, 5vw, 80px);
  align-items: end;
  margin-bottom: 48px;
}
.vida-intro h2 {
  font-family: var(--ed-serif);
  font-weight: 400;
  font-size: clamp(32px, 4.2vw, 60px);
  line-height: 1.05;
  letter-spacing: -0.015em;
  margin: 14px 0 0;
}
.vida-intro h2 em { font-style: italic; }
.vida-intro p {
  font-size: clamp(15px, 1.1vw, 17px);
  color: var(--ed-ink-2);
  margin: 0;
  max-width: 36em;
}
.vida-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 18px;
}
.vida-tags span {
  font-family: var(--ed-mono);
  font-size: 10.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ed-ink);
  border: 1px solid var(--ed-line);
  padding: 6px 12px;
  border-radius: 999px;
  background: var(--ed-bg-3);
}

.vida-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 14px;
}
.vida-card {
  position: relative;
  overflow: hidden;
  background: var(--ed-bg-2);
  border-radius: 2px;
  cursor: zoom-in;
  transition: transform .25s ease;
}
.vida-card:hover { transform: translateY(-3px); }
.vida-card .img {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center;
  transition: transform .8s cubic-bezier(.2,.7,.2,1);
}
.vida-card:hover .img { transform: scale(1.05); }
.vida-card::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(20,19,15,0) 45%, rgba(20,19,15,0.85) 100%);
  pointer-events: none;
}
.vida-card .badge {
  position: absolute;
  top: 14px; left: 14px;
  z-index: 2;
  font-family: var(--ed-mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  background: rgba(245,239,229,0.92);
  color: var(--ed-ink);
  padding: 6px 11px;
  border-radius: 999px;
}
.vida-card .cap {
  position: absolute;
  left: 22px; right: 22px; bottom: 22px;
  z-index: 2;
  color: var(--ed-cream);
}
.vida-card .cap .tag {
  font-family: var(--ed-mono);
  font-size: 9.5px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #d8c69a;
  display: block;
  margin-bottom: 8px;
}
.vida-card .cap h3 {
  font-family: var(--ed-serif);
  font-weight: 400;
  font-style: italic;
  font-size: clamp(20px, 1.9vw, 28px);
  line-height: 1.15;
  margin: 0 0 6px;
  letter-spacing: -0.01em;
}
.vida-card .cap p {
  font-family: var(--ed-sans);
  font-size: 13px;
  line-height: 1.5;
  margin: 0;
  color: rgba(245,239,229,0.85);
}

/* Layout positions: 6 photos with editorial rhythm */
.vida-card.v1 { grid-column: span 7; aspect-ratio: 16/10; }
.vida-card.v2 { grid-column: span 5; aspect-ratio: 4/5; }
.vida-card.v3 { grid-column: span 4; aspect-ratio: 1/1; }
.vida-card.v4 { grid-column: span 4; aspect-ratio: 1/1; }
.vida-card.v5 { grid-column: span 4; aspect-ratio: 1/1; }
.vida-card.v6 { grid-column: span 12; aspect-ratio: 21/8; }

/* ===== Galería con tabs ===== */
.gallery-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 28px;
  border-bottom: 1px solid var(--ed-line);
}
.gallery-tab {
  font-family: var(--ed-mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 14px 22px;
  color: var(--ed-muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.gallery-tab.active {
  color: var(--ed-ink);
  border-bottom-color: var(--ed-ink);
}
.gallery-count {
  font-size: 9px;
  color: var(--ed-muted);
  margin-left: 6px;
  vertical-align: super;
}

.gal-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 12px;
}
.gal-item {
  position: relative;
  overflow: hidden;
  background: var(--ed-bg-2);
  cursor: pointer;
  border-radius: 2px;
  transition: transform .4s ease;
}
.gal-item .img {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center;
  transition: transform .8s cubic-bezier(.2,.7,.2,1);
}
.gal-item:hover .img { transform: scale(1.05); }
.gal-item::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(20,19,15,0) 55%, rgba(20,19,15,0.78) 100%);
  pointer-events: none;
}
.gal-cap {
  position: absolute;
  left: 18px; right: 18px; bottom: 16px;
  z-index: 2;
  color: var(--ed-cream);
}
.gal-tag {
  font-family: var(--ed-mono);
  font-size: 9.5px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #d8c69a;
  display: block;
  margin-bottom: 6px;
}
.gal-title {
  font-family: var(--ed-serif);
  font-style: italic;
  font-size: clamp(15px, 1.4vw, 18px);
  line-height: 1.25;
  color: var(--ed-cream);
}
.gal-sub {
  font-size: 12px;
  color: rgba(245,239,229,0.78);
  margin-top: 4px;
  font-family: var(--ed-sans);
  letter-spacing: 0;
  text-transform: none;
}

/* Item sizes for editorial mosaic */
.gal-item.span-6 { grid-column: span 6; }
.gal-item.span-4 { grid-column: span 4; }
.gal-item.span-3 { grid-column: span 3; }
.gal-item.span-8 { grid-column: span 8; }
.gal-item.h-tall { aspect-ratio: 3/4; }
.gal-item.h-wide { aspect-ratio: 16/9; }
.gal-item.h-sq   { aspect-ratio: 1/1; }
.gal-item.h-tall-l { aspect-ratio: 9/16; }

/* ===== Sitios cards ===== */
.sitios-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 18px;
}
.sitio-card {
  position: relative;
  background: var(--ed-bg);
  border: 1px solid var(--ed-line);
  border-radius: 4px;
  overflow: hidden;
  cursor: pointer;
  transition: all .3s ease;
  display: block;
}
.sitio-card:hover { transform: translateY(-3px); box-shadow: var(--ed-shadow); }
.sitio-card .cover {
  aspect-ratio: 4/3;
  background-size: cover;
  background-position: center;
  position: relative;
}
.sitio-card .cover::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(20,19,15,0) 60%, rgba(20,19,15,0.6) 100%);
}
.sitio-card .cover .num {
  position: absolute; top: 14px; left: 14px;

/* ============================================================
   VIDA CAROUSEL
   ============================================================ */
function VidaCarousel({ items }) {
  const ref = useRef(null);
  const [canPrev, setCanPrev] = useState(false);
  const [canNext, setCanNext] = useState(true);

  const update = () => {
    const el = ref.current;
    if (!el) return;
    setCanPrev(el.scrollLeft > 8);
    setCanNext(el.scrollLeft + el.clientWidth < el.scrollWidth - 8);
  };
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    update();
    el.addEventListener("scroll", update);
    window.addEventListener("resize", update);
    return () => { el.removeEventListener("scroll", update); window.removeEventListener("resize", update); };
  }, []);

  const scrollBy = (dir) => {
    const el = ref.current;
    if (!el) return;
    const card = el.querySelector(".vida-slide");
    const w = card ? card.getBoundingClientRect().width + 16 : 400;
    el.scrollBy({ left: dir * w, behavior: "smooth" });
  };

  return (
    <div className="vida-carousel">
      <div className="vida-track" ref={ref}>
        {items.map((it, i) => (
          <figure key={i} className="vida-slide">
            <div className="img" style={{backgroundImage:`url(${it.src})`}}></div>
            <figcaption className="cap">
              {it.tag && <span className="tag">{it.tag}</span>}
              <h3>{it.title}</h3>
              <p>{it.caption}</p>
            </figcaption>
          </figure>
        ))}
      </div>
      <div className="vida-nav">
        <button className="vida-arrow" onClick={() => scrollBy(-1)} disabled={!canPrev} aria-label="Anterior">←</button>
        <button className="vida-arrow" onClick={() => scrollBy(1)} disabled={!canNext} aria-label="Siguiente">→</button>
      </div>
    </div>
  );
}
