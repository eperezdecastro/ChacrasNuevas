<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Master Plan · Chacras Nuevas de Matanzas</title>
  <meta name="description" content="Master plan completo: 10 sitios con superficie, estado y galería propia. Plano interactivo y descarga de brochure." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
/* ============================================================
   EDITORIAL SITE — Chacras Nuevas de Matanzas
   ============================================================ */
:root {
  --ed-bg: #f3ede1;
  --ed-bg-2: #e9e0cf;
  --ed-bg-3: #faf6ed;
  --ed-ink: #1a1a17;
  --ed-ink-2: #3d3a32;
  --ed-muted: #8a8475;
  --ed-line: rgba(26,26,23,0.12);
  --ed-line-soft: rgba(26,26,23,0.06);
  --ed-accent: #5a6b5a;
  --ed-accent-2: #b08a5a;
  --ed-dark: #14130f;
  --ed-cream: #f5efe5;
  --ed-serif: 'Cormorant Garamond', 'Times New Roman', serif;
  --ed-sans: 'Inter', system-ui, -apple-system, sans-serif;
  --ed-mono: 'JetBrains Mono', ui-monospace, monospace;
  --ed-shadow: 0 24px 60px -20px rgba(20,19,15,0.25);
  --ed-h1: clamp(40px, 6vw, 88px);
  --ed-h2: clamp(28px, 4vw, 56px);
  --ed-h3: clamp(20px, 2.5vw, 32px);
  --ed-body: clamp(15px, 1.05vw, 17px);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--ed-sans);
  font-size: var(--ed-body);
  line-height: 1.55;
  color: var(--ed-ink);
  background: var(--ed-bg);
  -webkit-font-smoothing: antialiased;
}
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; border: none; background: none; }

.eyebrow {
  font-family: var(--ed-mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ed-muted);
}

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--ed-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 14px 22px;
  border: 1px solid currentColor;
  border-radius: 999px;
  color: var(--ed-ink);
  background: transparent;
  transition: all .25s ease;
}
.btn:hover { background: var(--ed-ink); color: var(--ed-cream); border-color: var(--ed-ink); }
.btn.solid { background: var(--ed-ink); color: var(--ed-cream); border-color: var(--ed-ink); }
.btn.solid:hover { background: transparent; color: var(--ed-ink); }
.btn.light { color: var(--ed-cream); border-color: rgba(245,239,229,0.7); }
.btn.light:hover { background: var(--ed-cream); color: var(--ed-dark); border-color: var(--ed-cream); }
.btn.solid.light { background: var(--ed-cream); color: var(--ed-dark); border-color: var(--ed-cream); }
.btn.solid.light:hover { background: transparent; color: var(--ed-cream); border-color: var(--ed-cream); }
.btn .arrow { transition: transform .25s ease; }
.btn:hover .arrow { transform: translateX(4px); }
.btn.wp { display: inline-flex; align-items: center; gap: 10px; }
.btn.wp .pulse {
  width: 8px; height: 8px; border-radius: 50%;
  background: #79c267;
  box-shadow: 0 0 0 4px rgba(121,194,103,0.25);
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ===== Site nav ===== */
.site-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 20px 32px;
  transition: all .35s ease;
  color: var(--ed-cream);
  background: var(--ed-bg);
  color: var(--ed-ink);
  box-shadow: 0 1px 0 var(--ed-line);
}
.site-nav.scrolled {
  padding: 14px 32px;
}
.site-nav .links {
  display: flex;
  gap: 28px;
  font-family: var(--ed-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.site-nav .links.left { justify-self: start; }
.site-nav .links.right { justify-self: end; }
.site-nav .brand img {
  height: 38px;
  width: auto;
  transition: height .35s ease;
}
.site-nav .lang {
  border: 1px solid currentColor;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 10px;
}
.menu-btn { display: none; }

/* ===== Section base ===== */
.section {
  padding: clamp(60px, 8vw, 110px) clamp(20px, 4vw, 64px);
  border-top: 1px solid var(--ed-line);
}
.section.alt { background: var(--ed-bg-2); }
.section .head { margin-bottom: 32px; }
.section .head h2 {
  font-family: var(--ed-serif);
  font-weight: 400;
  font-size: var(--ed-h2);
  line-height: 1.08;
  letter-spacing: -0.01em;
  margin: 12px 0 0;
  max-width: 22em;
}
.section .head h2 em { font-style: italic; }
.section p {
  font-size: var(--ed-body);
  line-height: 1.65;
  color: var(--ed-ink-2);
  max-width: 38em;
}

/* ===== Legend ===== */
.legend {
  display: flex;
  gap: 22px;
  margin-top: 18px;
  font-family: var(--ed-mono);
  font-size: 10.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ed-muted);
  flex-wrap: wrap;
  align-items: center;
}
.legend i {
  display: inline-block;
  width: 9px; height: 9px;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
}
.legend i.av { background: #79c267; }
.legend i.re { background: #d6ad65; }
.legend i.so { background: #b3b3ad; }

/* ===== Master plan visualization ===== */
.masterplan-vis {
  position: relative;
  aspect-ratio: 1212/784;
  background: var(--ed-bg-3);
  border: 1px solid var(--ed-line);
  border-radius: 4px;
  overflow: hidden;
}
.masterplan-vis .map {
  position: absolute; inset: 0;
  background-size: contain;
  background-position: center;
  background-repeat: no-repeat;
  background-image: url(assets/proyecto/master-plan.png);
}
.masterplan-vis .pin {
  position: absolute;
  width: 80px; height: 80px;
  margin: -40px 0 0 -40px;
  border-radius: 50%;
  background: rgba(245,239,229,0.94);
  color: var(--ed-ink);
  font-family: var(--ed-serif);
  font-style: italic;
  font-size: 35px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: transform .25s, box-shadow .25s;
  box-shadow: 0 10px 35px rgba(0,0,0,0.3);
  border: 5px solid transparent;
}
.masterplan-vis .pin:hover { transform: scale(1.18); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
.masterplan-vis .pin.av { background: #79c267; color: #14130f; border-color: rgba(255,255,255,0.6); }
.masterplan-vis .pin.re { background: #d6ad65; color: #14130f; border-color: rgba(255,255,255,0.6); }
.masterplan-vis .pin.so { background: rgba(179,179,173,0.85); color: #fff; }

/* ===== Sitios cards ===== */
.sitios-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 18px;
}
.sitio-card {
  position: relative;
  background: var(--ed-bg);
  border: 1px solid var(--ed-line);
  border-radius: 4px;
  overflow: hidden;
  cursor: pointer;
  transition: all .3s ease;
  text-align: left;
  width: 100%;
}
.sitio-card:hover { transform: translateY(-3px); box-shadow: var(--ed-shadow); }
.sitio-card .cover {
  aspect-ratio: 4/3;
  background-size: cover;
  background-position: center;
  position: relative;
}
.sitio-card .cover::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(20,19,15,0) 60%, rgba(20,19,15,0.6) 100%);
}
.sitio-card .cover .num {
  position: absolute; top: 14px; left: 14px;
  font-family: var(--ed-serif);
  font-style: italic;
  font-size: 32px;
  color: var(--ed-cream);
  z-index: 2;
  text-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
.sitio-card .cover .pin {
  position: absolute; top: 14px; right: 14px;
  font-family: var(--ed-mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  background: rgba(245,239,229,0.92);
  color: var(--ed-ink);
  padding: 5px 10px;
  border-radius: 999px;
  z-index: 2;
  width: auto; height: auto;
  margin: 0;
  box-shadow: none;
  border: none;
  font-style: normal;
  display: inline-block;
  cursor: default;
  transform: none;
}
.sitio-card .cover .pin.av { background: #79c267; color: #14130f; }
.sitio-card .cover .pin.re { background: #d6ad65; color: #14130f; }
.sitio-card .cover .pin.so { background: #b3b3ad; color: #ffffff; }
.sitio-card .body {
  padding: 16px 18px 18px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
}
.sitio-card .area {
  font-family: var(--ed-serif);
  font-style: italic;
  font-size: 22px;
  letter-spacing: -0.01em;
}
.sitio-card .price {
  font-family: var(--ed-mono);
  font-size: 12px;
  letter-spacing: 0.06em;
  color: var(--ed-ink-2);
}
.sitio-card .more {
  position: absolute;
  bottom: 12px; right: 14px;
  font-family: var(--ed-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ed-muted);
  opacity: 0;
  transition: opacity .25s;
}
.sitio-card:hover .more { opacity: 1; }

/* ===== Table ===== */
.sitios-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--ed-sans);
  margin-top: 24px;
}
.sitios-table th {
  font-family: var(--ed-mono);
  font-size: 10.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ed-muted);
  padding: 14px 16px;
  text-align: left;
  border-bottom: 1px solid var(--ed-line);
  font-weight: 400;
}
.sitios-table td {
  padding: 18px 16px;
  border-bottom: 1px solid var(--ed-line-soft);
  font-size: 14px;
}
.sitios-table tr:hover td { background: var(--ed-bg-3); }
.sitios-table .num {
  font-family: var(--ed-serif);
  font-style: italic;
  font-size: 22px;
}
.sitios-table .stat {
  font-family: var(--ed-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 999px;
  display: inline-block;
}
.sitios-table .stat.av { background: rgba(121,194,103,0.18); color: #2e6b1e; }
.sitios-table .stat.re { background: rgba(214,173,101,0.22); color: #806020; }
.sitios-table .stat.so { background: rgba(179,179,173,0.25); color: #4d4d48; }

/* ===== Form / Contacto ===== */
.form-block {
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: clamp(28px, 4vw, 80px);
  align-items: start;
}
.form-block form { display: grid; gap: 14px; }
.form-block input,
.form-block select,
.form-block textarea {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--ed-line);
  padding: 14px 0;
  font-family: var(--ed-sans);
  font-size: 15px;
  outline: none;
  color: var(--ed-ink);
  width: 100%;
}
.form-block input:focus,
.form-block select:focus,
.form-block textarea:focus { border-bottom-color: var(--ed-ink); }
.form-block textarea { resize: vertical; min-height: 80px; }

/* ===== Lightbox ===== */
.lb {
  position: fixed; inset: 0;
  z-index: 100;
  background: rgba(20,19,15,0.78);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  animation: fadeIn .25s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.lb-card {
  background: var(--ed-bg);
  width: 100%;
  max-width: 1100px;
  max-height: 92vh;
  border-radius: 4px;
  display: grid;
  grid-template-rows: auto 1fr auto;
  overflow: hidden;
  position: relative;
}
.lb-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 24px;
  padding: 22px 28px 0;
}
.lb-num {
  font-family: var(--ed-serif);
  font-style: italic;
  font-size: 42px;
  line-height: 1;
}
.lb-meta { font-family: var(--ed-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ed-muted); }
.lb-close {
  position: absolute;
  top: 14px; right: 18px;
  font-size: 24px;
  color: var(--ed-muted);
  z-index: 5;
  cursor: pointer;
}
.lb-main {
  position: relative;
  padding: 18px 28px;
  overflow: hidden;
}
.lb-stage {
  position: relative;
  aspect-ratio: 16/10;
  background: var(--ed-bg-2);
  border-radius: 2px;
  overflow: hidden;
}
.lb-stage .img {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center;
  transition: opacity .3s;
}
.lb-stage .cap {
  position: absolute;
  left: 20px; bottom: 18px;
  z-index: 3;
  color: var(--ed-cream);
  text-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
.lb-stage::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0) 60%, rgba(0,0,0,0.55) 100%);
  pointer-events: none;
}
.gal-tag {
  font-family: var(--ed-mono);
  font-size: 9.5px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #d8c69a;
  display: block;
  margin-bottom: 6px;
}
.gal-title {
  font-family: var(--ed-serif);
  font-style: italic;
  font-size: clamp(15px, 1.4vw, 22px);
  line-height: 1.25;
  color: var(--ed-cream);
}
.gal-sub {
  font-size: 12px;
  color: rgba(245,239,229,0.78);
  margin-top: 4px;
  font-family: var(--ed-sans);
}
.lb-thumbs {
  display: flex;
  gap: 10px;
  margin-top: 14px;
  overflow-x: auto;
  padding-bottom: 4px;
}
.lb-thumb {
  position: relative;
  flex: 0 0 92px;
  aspect-ratio: 4/3;
  background-size: cover;
  background-position: center;
  border-radius: 2px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color .2s;
  overflow: hidden;
}
.lb-thumb.active { border-color: var(--ed-ink); }
.lb-thumb .star {
  position: absolute;
  top: 4px; right: 4px;
  background: rgba(245,239,229,0.92);
  color: var(--ed-ink);
  width: 22px; height: 22px;
  border-radius: 50%;
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
}
.lb-thumb.is-cover .star { background: var(--ed-accent-2); color: var(--ed-cream); }
.lb-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 18px 28px 22px;
  border-top: 1px solid var(--ed-line);
  background: var(--ed-bg-3);
  flex-wrap: wrap;
}
.lb-foot .stats {
  display: flex; gap: 24px;
  font-family: var(--ed-mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ed-ink-2);
}
.lb-foot .stats strong {
  font-family: var(--ed-serif);
  font-style: italic;
  font-weight: 400;
  font-size: 18px;
  letter-spacing: -0.01em;
  display: block;
  color: var(--ed-ink);
  margin-top: 4px;
  text-transform: none;
}

/* ===== Modal ===== */
.modal {
  position: fixed; inset: 0;
  z-index: 110;
  background: rgba(20,19,15,0.65);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.modal-card {
  background: var(--ed-bg);
  width: 100%;
  max-width: 480px;
  padding: 40px 32px 32px;
  border-radius: 4px;
  position: relative;
  box-shadow: 0 30px 80px -20px rgba(0,0,0,0.5);
}
.modal-close {
  position: absolute;
  top: 12px; right: 14px;
  font-size: 24px;
  color: var(--ed-muted);
  cursor: pointer;
}
.modal h3 {
  font-family: var(--ed-serif);
  font-weight: 400;
  font-size: 36px;
  line-height: 1.05;
  margin: 10px 0 8px;
}
.modal h3 em { font-style: italic; }

/* ===== WP FAB ===== */
.wp-fab {
  position: fixed;
  bottom: 24px; right: 24px;
  z-index: 40;
  background: #2a302a;
  color: var(--ed-cream);
  border-radius: 999px;
  padding: 14px 22px;
  font-family: var(--ed-sans);
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 18px 40px -12px rgba(0,0,0,0.4);
  transition: transform .2s;
}
.wp-fab:hover { transform: translateY(-2px); }
.wp-fab .pulse {
  width: 8px; height: 8px; border-radius: 50%;
  background: #79c267;
  box-shadow: 0 0 0 4px rgba(121,194,103,0.28);
}

/* ===== Footer ===== */
.site-foot {
  background: var(--ed-dark);
  color: var(--ed-cream);
  padding: 80px 32px 32px;
}
.site-foot .top {
  display: grid;
  grid-template-columns: 1.6fr 1fr 1fr 1fr;
  gap: 40px;
  border-bottom: 1px solid rgba(245,239,229,0.12);
  padding-bottom: 48px;
}
.site-foot img { height: 60px; filter: invert(1) brightness(1.05); }
.site-foot h4 {
  font-family: var(--ed-mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(245,239,229,0.6);
  margin: 0 0 16px;
  font-weight: 400;
}
.site-foot ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
.site-foot ul li { font-size: 14px; color: rgba(245,239,229,0.85); }
.site-foot .bottom {
  display: flex;
  justify-content: space-between;
  padding-top: 24px;
  font-family: var(--ed-mono);
  font-size: 10.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(245,239,229,0.5);
}

/* ===== Master Plan hero ===== */
.mp-hero {
  padding: 120px 32px 60px;
  background: var(--ed-bg);
  border-bottom: 1px solid var(--ed-line);
}
.mp-hero-inner { max-width: 980px; margin: 0 auto; }
.mp-hero h1 {
  font-family: var(--ed-serif);
  font-weight: 400;
  font-size: clamp(40px, 6vw, 84px);
  line-height: 1.04;
  letter-spacing: -0.015em;
  margin: 14px 0 24px;
}
.mp-hero h1 em { font-style: italic; }
.mp-hero p { font-size: clamp(15px, 1.1vw, 17px); max-width: 38em; color: var(--ed-ink-2); }

/* ===== Responsive ===== */
@media (max-width: 980px) {
  .site-nav { grid-template-columns: 1fr auto; padding: 14px 20px; }
  .site-nav .links { display: none; }
  .menu-btn { display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; color: inherit; justify-self: end; }
  .site-nav .brand { justify-self: start; }
  .menu-open { display: flex !important; flex-direction: column; position: fixed; inset: 0; background: var(--ed-bg); padding: 80px 32px; gap: 18px; align-items: center; justify-content: center; font-size: 18px; letter-spacing: 0.12em; z-index: 60; color: var(--ed-ink); }
  .form-block { grid-template-columns: 1fr; }
  .site-foot .top { grid-template-columns: 1fr 1fr; gap: 32px; }
  .site-foot .bottom { flex-direction: column; gap: 8px; }
  .lb-card { max-height: 96vh; }
  .lb-head { padding: 18px 20px 0; }
  .lb-main { padding: 12px 20px; }
  .lb-foot { padding: 14px 20px 16px; }
  .lb-num { font-size: 32px; }
  .wp-fab { bottom: 16px; right: 16px; padding: 12px 18px; font-size: 11px; }
  .mp-hero { padding: 100px 20px 40px; }
  .sitios-table th:nth-child(3), .sitios-table td:nth-child(3) { display: none; }
}
@media (max-width: 640px) {
  .sitios-grid { grid-template-columns: 1fr 1fr; }
}
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Formulario oculto — detección de Netlify Forms en build time -->

/* ============================================================
   SITIO LIGHTBOX
   ============================================================ */
function SitioLightbox({ sitio, coverIndex, onSetCover, onClose }) {
  const initial = coverIndex != null ? coverIndex : sitio.imagenes.findIndex(i => i.cover);
  const [active, setActive] = useState(Math.max(0, initial));
  const k = STATUS_KEY(sitio.estado);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape") onClose();
      if (e.key === "ArrowRight") setActive(i => Math.min(sitio.imagenes.length - 1, i + 1));
      if (e.key === "ArrowLeft")  setActive(i => Math.max(0, i - 1));
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [sitio.imagenes.length, onClose]);

  const img = sitio.imagenes[active];
  const currentCoverIdx = coverIndex != null ? coverIndex : sitio.imagenes.findIndex(i => i.cover);
  const isCoverNow = currentCoverIdx === active;

  return (
    <div className="lb" onClick={onClose}>
      <div className="lb-card" onClick={e => e.stopPropagation()}>
        <button className="lb-close" onClick={onClose}>×</button>
        <div className="lb-head">
          <div>
            <div className="lb-num">Sitio {sitio.sitio}</div>
            <div className="lb-meta">{sitio.m2} m² · {sitio.estado}</div>
          </div>
          <div style={{fontFamily:"var(--ed-mono)", fontSize:11, letterSpacing:"0.16em", textTransform:"uppercase", color:"var(--ed-muted)"}}>
            {active + 1} / {sitio.imagenes.length}
          </div>
        </div>
        <div className="lb-main">
          <div className="lb-stage">
            <div className="img" style={{backgroundImage:`url(${img.src})`}}></div>
            <div className="cap">
              <div className="gal-tag">Sitio {sitio.sitio}</div>
              <div className="gal-title">{img.title}</div>
              <div className="gal-sub">{img.caption}</div>
            </div>
          </div>
          {sitio.imagenes.length > 1 && (
            <div className="lb-thumbs">
              {sitio.imagenes.map((im, i) => {
                const isCov = currentCoverIdx === i;
                return (
                  <div
                    key={i}
                    className={"lb-thumb" + (i === active ? " active" : "") + (isCov ? " is-cover" : "")}
                    style={{backgroundImage:`url(${im.src})`}}
                    onClick={() => setActive(i)}
                    title={im.title}
                  >
                    {isCov && <span className="star" title="Portada actual">★</span>}
                  </div>
                );
              })}
            </div>
          )}
        </div>
        <div className="lb-foot">
          <div className="stats">
            <div>Sitio<strong>Nº {sitio.sitio}</strong></div>
            <div>Superficie<strong>{sitio.m2} m²</strong></div>
            <div>Estado<strong>{sitio.estado}</strong></div>
            {/* precio oculto — disponible bajo consulta */}
          </div>
          <div style={{display:"flex", gap:10, flexWrap:"wrap"}}>
            {sitio.imagenes.length > 1 && (
              <button className="btn" onClick={() => onSetCover(active)} disabled={isCoverNow}
                style={{opacity: isCoverNow ? 0.5 : 1}}>
                {isCoverNow ? "★ Portada actual" : "Usar como portada"}
              </button>
            )}
            <a href={WA_URL} target="_blank" rel="noopener noreferrer" className="btn solid wp" onClick={onClose}>
              <span className="pulse"></span>Consultar este sitio
            </a>
          </div>
        </div>
      </div>
    </div>
  );
}
